name: smart_task_manager
description: "Smart Task Manager application built with Flutter using feature-first Clean Architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management + DI + routing
  get: ^4.6.6

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_messaging: ^16.2.2
  firebase_crashlytics: ^5.2.2
  firebase_analytics: ^12.4.1

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Network & connectivity
  connectivity_plus: ^7.1.1
  dio: ^5.4.3+1

  # Image handling
  cached_network_image: ^3.4.1

  # Storage (secure)
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.3.3

  # UI helpers
  intl: ^0.20.2
  shimmer: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
